name: Unzip iOS Project
on:
  push:
    branches: [ main ]
jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Unzip iOS Folder
        run: |
          rm -rf ios
          unzip ios.zip
      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git rm -f ios.zip
          git add ios/
          git commit -m "Unzip iOS framework folder automatically" || exit 0
          git push